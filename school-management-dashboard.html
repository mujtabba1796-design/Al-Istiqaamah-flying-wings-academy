<!DOCTYPE html>\n<html lang='en'>\n<head>\n    <meta charset='UTF-8'>\n    <meta name='viewport' content='width=device-width, initial-scale=1.0'>\n    <title>School Management Dashboard</title>\n    <link href='https://cdn.jsdelivr.net/npm/tailwindcss@^1.0/dist/tailwind.min.css' rel='stylesheet'>\n    <script src='https://cdn.jsdelivr.net/npm/chart.js'></script>\n    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css'>\n    <style>\n        body { font-family: Arial, sans-serif; }\n        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgb(0,0,0); background-color: rgba(0,0,0,0.4); padding-top: 60px; }\n        .modal-content { background-color: #fefefe; margin: 5% auto; padding: 20px; border: 1px solid #888; width: 80%; }\n    </style>\n</head>\n<body class='bg-gray-100'>\n    <header class='bg-blue-600 text-white p-4'>\n        <h1 class='text-xl'>School Management Dashboard</h1>\n    </header>\n    <main class='p-6'>\n        <div class='grid grid-cols-1 md:grid-cols-3 gap-4'>\n            <!-- Dashboard -->\n            <div class='bg-white p-5 shadow rounded'>\n                <h2 class='font-bold text-lg'>Dashboard</h2>\n                <canvas id='dashboardChart'></canvas>\n            </div>\n            <!-- Students -->\n            <div class='bg-white p-5 shadow rounded'>\n                <h2 class='font-bold text-lg'>Students</h2>\n                <button onclick='openModal()'>Add Student</button>\n                <ul id='studentList'></ul>\n                <script>\n                    const students = [{name: 'John Doe', grade: 'A', paymentStatus: 'Paid'}, {name: 'Jane Smith', grade: 'B', paymentStatus: 'Pending'}];\n                    const studentList = document.getElementById('studentList');\n                    students.forEach(student => {\n                        const li = document.createElement('li');\n                        li.textContent = `${student.name} (Grade: ${student.grade}, Payment: ${student.paymentStatus})`;\n                        studentList.appendChild(li);\n                    });\n                <\/script>\n            </div>\n            <!-- Fees -->\n            <div class='bg-white p-5 shadow rounded'>\n                <h2 class='font-bold text-lg'>Fees</h2>\n                <p>Total Fees Collected: $2500</p>\n            </div>\n            <!-- Boarding -->\n            <div class='bg-white p-5 shadow rounded'>\n                <h2 class='font-bold text-lg'>Boarding</h2>\n                <p>Boarders Count: 10</p>\n            </div>\n            <!-- Teachers -->\n            <div class='bg-white p-5 shadow rounded'>\n                <h2 class='font-bold text-lg'>Teachers</h2>\n                <ul id='teacherList'></ul>\n                <script>\n                    const teachers = [{name: 'Mr. Adams'}, {name: 'Ms. Johnson'}];\n                    const teacherList = document.getElementById('teacherList');\n                    teachers.forEach(teacher => {\n                        const li = document.createElement('li');\n                        li.textContent = teacher.name;\n                        teacherList.appendChild(li);\n                    });\n                <\/script>\n            </div>\n            <!-- Reports -->\n            <div class='bg-white p-5 shadow rounded'>\n                <h2 class='font-bold text-lg'>Reports</h2>\n                <button onclick='generateReport()'>Generate Report</button>\n            </div>\n            <!-- Parent View -->\n            <div class='bg-white p-5 shadow rounded'>\n                <h2 class='font-bold text-lg'>Parent View</h2>\n                <p>Information for Parents</p>\n            </div>\n            <!-- Teacher View -->\n            <div class='bg-white p-5 shadow rounded'>\n                <h2 class='font-bold text-lg'>Teacher View</h2>\n                <p>Information for Teachers</p>\n            </div>\n        </div>\n    </main>\n    <div id='myModal' class='modal'>\n        <div class='modal-content'>\n            <span onclick='closeModal()' class='close'>&times;</span>\n            <h2>Add Student</h2>\n            <input type='text' id='newStudentName' placeholder='Student Name'>\n            <input type='text' id='newStudentGrade' placeholder='Grade'>\n            <button onclick='addStudent()'>Add</button>\n        </div>\n    </div>\n    <script>\n        function openModal() { document.getElementById('myModal').style.display = 'block'; }\n        function closeModal() { document.getElementById('myModal').style.display = 'none'; }\n        function addStudent() {\n            const name = document.getElementById('newStudentName').value;\n            const grade = document.getElementById('newStudentGrade').value;\n            const li = document.createElement('li');\n            li.textContent = `${name} (Grade: ${grade})`;\n            document.getElementById('studentList').appendChild(li);\n            closeModal();\n        }\n        function generateReport() { alert('Generating report...'); }\n    </script>\n</body>\n</html>\n
